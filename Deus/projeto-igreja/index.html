<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elim Church - CasaBlanca</title>
    <style>
        :root {
            --azul-escuro: #1a2a6c;
            --turquesa: #00e5ff;
            --branco: #ffffff;
            --sombra: rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(180deg, var(--azul-escuro) 0%, var(--turquesa) 100%);
            min-height: 100vh;
            color: var(--branco);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ELEMENTO DECORATIVO: PALMEIRA AO FUNDO */
        .palmeira-bg {
            position: fixed;
            bottom: -50px;
            left: -30px;
            font-size: 15rem;
            opacity: 0.05;
            transform: rotate(15deg);
            pointer-events: none;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            padding: 60px 20px;
            text-align: center;
            z-index: 2;
        }

        /* LOGO CENTRAL */
        .logo-container {
            margin-bottom: 40px;
        }

        .logo-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px var(--sombra);
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 20px;
            text-shadow: 2px 2px 10px var(--sombra);
        }

        .subtitulo {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
            margin-bottom: 50px;
        }

        /* MENU EM GRID */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 20px;
            border-radius: 25px;
            text-decoration: none;
            color: var(--branco);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--turquesa);
            box-shadow: 0 15px 40px rgba(0, 229, 255, 0.4);
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 5px var(--sombra));
        }

        .card h2 {
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 0.95rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .logo-img { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

    <div class="palmeira-bg">🌴</div>

    <div class="main-container">
        <header class="logo-container">
          <img src="../img/elim01.png" alt="Elim Church" class="logo">
            <h1>Elim Church</h1>
            <p class="subtitulo">CasaBlanca • Um Oásis de Palavra e Vida</p>
        </header>

        <nav class="menu-grid">
            <a href="estudos.html" class="card">
                <div class="card-icon">📚</div>
                <h2>Biblioteca</h2>
                <p>Navegue pela cronologia bíblica, do Verbo até a Conquista.</p>
            </a>

            <a href="quiz.html" class="card">
                <div class="card-icon">🧩</div>
                <h2>Desafio Quiz</h2>
                <p>Teste seus conhecimentos com 6 questões aleatórias.</p>
            </a>
        </nav>

        <footer>
            <p>Elim Church CasaBlanca — "Onde há fontes e palmeiras."</p>
        </footer>
    </div>

</body>
</html>
